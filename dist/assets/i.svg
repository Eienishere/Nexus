<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#grad1)"/>
  
  <!-- Nexus nodes/circles -->
  <circle cx="20" cy="20" r="6" fill="white" opacity="0.9"/>
  <circle cx="44" cy="20" r="6" fill="white" opacity="0.9"/>
  <circle cx="32" cy="44" r="6" fill="white" opacity="0.8"/>
  
  <!-- Connecting lines -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="20" x2="32" y2="44" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="20" x2="32" y2="44" stroke="white" stroke-width="2" opacity="0.6"/>
  
  <!-- Center pulse circle -->
  <circle cx="32" cy="32" r="3" fill="white"/>
</svg>
